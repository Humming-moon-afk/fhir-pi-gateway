<!DOCTYPE html>
<html lang="de">
    <head>
        <link rel="stylesheet" href="style.css">
        <meta charset="UTF-8">
        <title>Patient Register</title>
    </head>
    <body>
    <form id="PatientForm">
        <label for="firstName"> Vorname:</label>
        <input id="firstName" name="firstName" type="text">

        <label for="lastName">Nachname:</label>
        <input id="lastName" name="lastName" type="text">

        <label for="patientID">Patienten-ID:</label>
        <input id="patientID" name="patientID" type="text">

        <label for="gender">Geschlecht:</label>
        <select id="gender" name="gender">
            <option value="female">Weiblich</option>
            <option value="male">Männlich</option>
            <option value="other">Anders</option>
            <option value="unknown">Unbekannt</option>
        </select>

        <label for="birthDate">Geburtsdatum:</label>
        <input id="birthDate" name="birthDate" type="date">

        <label for="managingClinic">Behandelne Klinik</label>
        <input id="managingClinic" name="managingClinic" type="text">

        <label for="Sonstiges">Sonstiges:</label>
        <textarea id="Sonstiges" name="Sonstiges"></textarea>
        
        <button type="submit">Patient registrieren</button>
        </form>
        <script src="app.js"></script>
    </body>
</html>
