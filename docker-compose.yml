version: '3.8'

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: fhir_postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: fhir_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata: